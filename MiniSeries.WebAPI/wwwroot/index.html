<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGenAI - Đăng nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-200 relative overflow-hidden">
    
    <div class="absolute w-96 h-96 bg-purple-600/10 rounded-full blur-3xl -top-20 -left-20"></div>
    <div class="absolute w-96 h-96 bg-blue-600/10 rounded-full blur-3xl -bottom-20 -right-20"></div>

    <div class="w-full max-w-md p-8 rounded-2xl glass z-10 shadow-2xl mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-wider text-white">Edu<span class="text-purple-500">Gen</span>AI</h1>
            <p class="text-sm text-slate-400 mt-2" id="formSubtitle">Đăng nhập để bắt đầu chuyển đổi bài học</p>
        </div>

        <div id="loginFormSection">
            <form id="loginForm" class="space-y-4" action="#" method="post" novalidate>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" name="email" autocomplete="email" class="w-full px-4 py-3 bg-slate-900/50 border border-slate-800 rounded-xl focus:outline-none focus:border-purple-500 text-white transition" placeholder="name@example.com" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" for="loginPassword">Mật khẩu</label>
                    <input type="password" id="loginPassword" name="password" autocomplete="current-password" class="w-full px-4 py-3 bg-slate-900/50 border border-slate-800 rounded-xl focus:outline-none focus:border-purple-500 text-white transition" placeholder="••••••••" required>
                </div>
                <button type="submit" id="loginBtn" class="w-full py-3 mt-4 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-semibold rounded-xl transition shadow-lg shadow-purple-600/20 flex justify-center items-center">
                    Đăng nhập
                </button>
            </form>
            <p class="text-center text-sm text-slate-400 mt-6">
                Chưa có tài khoản? <a href="#" id="toRegisterLink" class="text-purple-400 hover:underline">Đăng ký ngay</a>
            </p>
        </div>

        <div id="registerFormSection" class="hidden">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Họ và tên</label>
                    <input type="text" id="regName" class="w-full px-4 py-3 bg-slate-900/50 border border-slate-800 rounded-xl focus:outline-none focus:border-purple-500 text-white transition" placeholder="Nguyễn Văn A">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email</label>
                    <input type="email" id="regEmail" class="w-full px-4 py-3 bg-slate-900/50 border border-slate-800 rounded-xl focus:outline-none focus:border-purple-500 text-white transition" placeholder="name@example.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Mật khẩu</label>
                    <input type="password" id="regPassword" class="w-full px-4 py-3 bg-slate-900/50 border border-slate-800 rounded-xl focus:outline-none focus:border-purple-500 text-white transition" placeholder="Tối thiểu 6 ký tự">
                </div>
                <button id="registerBtn" class="w-full py-3 mt-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-semibold rounded-xl transition shadow-lg flex justify-center items-center">
                    Đăng ký tài khoản
                </button>
            </div>
            <p class="text-center text-sm text-slate-400 mt-6">
                Đã có tài khoản? <a href="#" id="toLoginLink" class="text-blue-400 hover:underline">Quay lại đăng nhập</a>
            </p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const loginSection = document.getElementById("loginFormSection");
        const registerSection = document.getElementById("registerFormSection");
        const formSubtitle = document.getElementById("formSubtitle");
        const toRegisterLink = document.getElementById("toRegisterLink");
        const toLoginLink = document.getElementById("toLoginLink");

        if (toRegisterLink) {
            toRegisterLink.addEventListener("click", function (e) {
                e.preventDefault();
                loginSection.classList.add("hidden");
                registerSection.classList.remove("hidden");
                formSubtitle.innerText = "Đăng ký tài khoản mới để trải nghiệm hệ thống";
            });
        }

        if (toLoginLink) {
            toLoginLink.addEventListener("click", function (e) {
                e.preventDefault();
                registerSection.classList.add("hidden");
                loginSection.classList.remove("hidden");
                formSubtitle.innerText = "Đăng nhập để bắt đầu chuyển đổi bài học";
            });
        }

        const loginForm = document.getElementById("loginForm");
        if (loginForm) {
            loginForm.addEventListener("submit", function (e) {
                e.preventDefault();
            });
        }

        // XỬ LÝ SỰ KIỆN: ĐĂNG NHẬP
        const oldLoginBtn = document.getElementById("loginBtn");
        if (oldLoginBtn) {
            console.log("🎯 Đã tìm thấy nút Đăng nhập. Tiến hành bẻ gãy mọi sự kiện cũ trùng lặp!");
            const newLoginBtn = oldLoginBtn.cloneNode(true);
            oldLoginBtn.parentNode.replaceChild(newLoginBtn, oldLoginBtn);
            newLoginBtn.setAttribute("type", "button");

            newLoginBtn.addEventListener("click", function (e) {
                e.preventDefault();
                e.stopPropagation();

                const emailInput = document.getElementById("loginEmail");
                const passwordInput = document.getElementById("loginPassword");
                if (!emailInput || !passwordInput) return;

                const email = emailInput.value.trim().toLowerCase();
                const password = passwordInput.value;

                if (!email || !password) {
                    alert("Vui lòng điền đầy đủ Email và Mật khẩu!");
                    return;
                }

                if (email === "admin@test.com" && password === "123456") {
                    localStorage.setItem('userId', 'mock-admin-id-999');
                    localStorage.setItem('user_name', 'MOCK ADMIN');
                    localStorage.setItem('userRole', 'Admin');
                    localStorage.setItem('user_role', 'Admin');
                    alert("Đăng nhập quyền ADMIN thành công!");
                    window.location.href = "dashboard.html";
                    return;
                }

                if (email === "staff@test.com" && password === "123456") {
                    localStorage.setItem('userId', 'mock-staff-id-888');
                    localStorage.setItem('user_name', 'MOCK STAFF');
                    localStorage.setItem('userRole', 'Staff');
                    localStorage.setItem('user_role', 'Staff');
                    alert("Đăng nhập quyền STAFF thành công!");
                    window.location.href = "dashboard.html";
                    return;
                }

                console.log("Tài khoản người dùng, chuyển tiếp sang hàm xử lý API auth.js...");
                if (typeof handleLogin === "function") {
                    handleLogin(email, password);
                } else {
                    alert("Không tải được module đăng nhập (auth.js). Vui lòng tải lại trang.");
                }
            });
        }

        // XỬ LÝ SỰ KIỆN: ĐĂNG KÝ MỚI
        const registerBtn = document.getElementById("registerBtn");
        if (registerBtn) {
            registerBtn.addEventListener("click", function (e) {
                e.preventDefault();

                const regNameInput = document.getElementById("regName");
                const regEmailInput = document.getElementById("regEmail");
                const regPasswordInput = document.getElementById("regPassword");

                const fullName = regNameInput ? regNameInput.value.trim() : "";
                const email = regEmailInput ? regEmailInput.value.trim().toLowerCase() : "";
                const password = regPasswordInput ? regPasswordInput.value : "";

                if (!fullName || !email || !password) {
                    alert("Vui lòng điền đầy đủ các thông tin đăng ký!");
                    return;
                }

                if (password.length < 6) {
                    alert("Mật khẩu bảo mật phải tối thiểu từ 6 ký tự trở lên!");
                    return;
                }

                console.log("Đang gửi yêu cầu đăng ký tài khoản mới lên API...");
                if (typeof handleRegister === "function") {
                    handleRegister(email, password, fullName);
                } else {
                    alert("Không tải được cấu trúc xử lý đăng ký tài khoản (auth.js). Vui lòng tải lại trang.");
                }
            });
        }
    });
    </script>
</body>
</html>
